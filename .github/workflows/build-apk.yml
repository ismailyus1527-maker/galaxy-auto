name: Build Galaxy Auto APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle
        uses: gradle/actions-setup-gradle@v4
        with:
          gradle-version: 8.6
          cache-disabled: true

      - name: Check files
        run: ls -la && cat app/build.gradle.kts && cat app/src/main/AndroidManifest.xml

      - name: Build Debug APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GalaxyAuto-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn