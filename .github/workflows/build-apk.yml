name: Build Galaxy Auto APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        run: |
          chmod +x ./gradlew
          printf 'distributionBase=GRABLE_USER_HOME\ndistributionPath=wrapper/dists\ndistributionUrl=https://services.gradle.org/distributions/gradle-8.6-bin.zip\nnetworkTimeout=10000\nvalidateDistributionUrl=true\n' > gradle/wrapper/gradle-wrapper.properties
          mkdir -p ~/.gradle
          echo 'org.gradle.daemon=false' >> ~/.gradle/gradle.properties
          echo 'org.gradle.jvmargs=-Xmx2048m' >> ~/.gradle/gradle.properties

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GalaxyAuto-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn